# Render Blueprint — https://render.com/docs/infrastructure-as-code
#
# Deploy: Render Dashboard → New → Blueprint → connect this Git repo → confirm.
# You will be prompted for MONGO_URI (MongoDB Atlas connection string).
#
# If this service name matches your live API hostname, Render keeps the same URL.

services:
  - type: web
    name: beatvault-music-streaming-web-application
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://timely-moonbeam-133b32.netlify.app
